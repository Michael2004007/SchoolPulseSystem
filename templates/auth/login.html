<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login — SchoolPulse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bricolage+Grotesque:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #F4F6FB;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .login-wrap {
            width: 100%;
            max-width: 420px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand-icon {
            width: 56px;
            height: 56px;
            background: #4F46E5;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            margin: 0 auto 1rem;
            box-shadow: 0 8px 24px rgba(79,70,229,0.3);
        }

        .brand-name {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            color: #0F1117;
            margin-bottom: 4px;
        }

        .brand-name span { color: #4F46E5; }

        .brand-sub {
            font-size: 0.8rem;
            color: #9CA3AF;
            letter-spacing: 0.5px;
        }

        .card-login {
            background: white;
            border: 1px solid #E8EAF0;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }

        .form-title {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 1.125rem;
            font-weight: 700;
            color: #0F1117;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .form-label {
            display: block;
            font-size: 0.775rem;
            font-weight: 600;
            color: #6B7280;
            margin-bottom: 6px;
        }

        .form-group { margin-bottom: 1.25rem; }

        .input-wrap { position: relative; }

        .input-wrap i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #9CA3AF;
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            background: #F8F9FC;
            border: 1px solid #E8EAF0;
            border-radius: 10px;
            color: #0F1117;
            padding: 0.65rem 0.875rem 0.65rem 2.25rem;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.18s, box-shadow 0.18s;
        }

        .form-control:focus {
            border-color: #4F46E5;
            box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
        }

        .btn-login {
            width: 100%;
            background: #4F46E5;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 0.875rem;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.18s;
            box-shadow: 0 4px 12px rgba(79,70,229,0.3);
            margin-top: 0.5rem;
        }

        .btn-login:hover {
            background: #4338CA;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(79,70,229,0.4);
        }

        .alert-danger {
            background: #FEF2F2;
            border: 1px solid rgba(220,38,38,0.2);
            color: #DC2626;
            border-radius: 10px;
            padding: 0.75rem 1rem;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 1.25rem;
        }

        .alert-warning {
            background: #FFFBEB;
            border: 1px solid rgba(217,119,6,0.2);
            color: #D97706;
            border-radius: 10px;
            padding: 0.75rem 1rem;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 1.25rem;
        }

        .footer-text {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.72rem;
            color: #9CA3AF;
        }
    </style>
</head>
<body>

<div class="login-wrap">
    <div class="login-header">
        <div class="brand-icon">
            <i class="bi bi-stars"></i>
        </div>
        <div class="brand-name"><span>School</span>Pulse</div>
        <div class="brand-sub">Colegio Nacional Panchito López</div>
    </div>

    <div class="card-login">
        <div class="form-title">Iniciar sesión</div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert-{{ category }}">
                        <i class="bi bi-exclamation-triangle-fill"></i>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label class="form-label">Usuario</label>
                <div class="input-wrap">
                    <i class="bi bi-person-fill"></i>
                    <input type="text" name="username" class="form-control"
                           placeholder="Ingresá tu usuario" required autofocus
                           autocomplete="username">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Contraseña</label>
                <div class="input-wrap">
                    <i class="bi bi-lock-fill"></i>
                    <input type="password" name="password" class="form-control"
                           placeholder="Ingresá tu contraseña" required
                           autocomplete="current-password">
                </div>
            </div>
            <button type="submit" class="btn-login">
                <i class="bi bi-box-arrow-in-right me-2"></i>
                Ingresar al sistema
            </button>
        </form>
    </div>

    <div class="footer-text">
        SchoolPulse &copy; 2026 — Sistema de Eventos
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
