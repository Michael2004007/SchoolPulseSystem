{% block scripts %}
<script>
    const filtroNombre = document.getElementById('filtro-nombre');
    const filtroCurso = document.getElementById('filtro-curso');
    const filtroPulsera = document.getElementById('filtro-pulsera');

    function normalizar(str) {
        return (str || '')
            .trim()
            .toLowerCase()
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '');
    }

    // elimina TODOS los espacios para comparar tipo "3a" vs "3 a"
    function limpiarClave(str) {
        return normalizar(str).replace(/\s+/g, '');
    }

    function filtrar() {
        const nombre = limpiarClave(filtroNombre?.value || '');
        const curso = limpiarClave(filtroCurso?.value || '');
        const pulsera = (filtroPulsera?.value || '').trim();

        const filas = document.querySelectorAll('.fila-alumno');
        let visibles = 0;

        filas.forEach(fila => {
            const fn = limpiarClave(fila.dataset.nombre);
            const fc = limpiarClave(fila.dataset.curso);
            const fp = fila.dataset.pulseras || '';

            const matchNombre = !nombre || fn.includes(nombre);
            const matchCurso = !curso || fc.includes(curso);
            const matchPulsera = !pulsera || fp.split(',').includes(pulsera);

            const mostrar = matchNombre && matchCurso && matchPulsera;

            fila.style.display = mostrar ? '' : 'none';
            if (mostrar) visibles++;
        });

        const sinResultados = document.getElementById('sin-resultados');
        if (sinResultados) {
            sinResultados.style.display = visibles === 0 ? 'block' : 'none';
        }
    }

    filtroNombre?.addEventListener('input', filtrar);
    filtroCurso?.addEventListener('input', filtrar);
    filtroPulsera?.addEventListener('input', filtrar);

    function abrirModal(alumnoId, nombre, curso, pulseras) {
        document.getElementById('modal-alumno-nombre').textContent = nombre;
        document.getElementById('modal-alumno-curso').textContent = 'Curso: ' + curso;
        document.getElementById('form-eliminar').action = '/reparto/eliminar/' + alumnoId;

        const contenedor = document.getElementById('modal-alumno-pulseras');
        contenedor.innerHTML = '';

        pulseras.forEach(p => {
            const span = document.createElement('span');
            span.textContent = '#' + p;
            span.style.cssText = `
                background: var(--primary-light);
                color: var(--primary);
                border: 1px solid rgba(79,70,229,0.2);
                padding: 2px 8px;
                border-radius: 6px;
                font-size: 0.72rem;
                font-weight: 700;
            `;
            contenedor.appendChild(span);
        });

        new bootstrap.Modal(document.getElementById('modalEliminar')).show();
    }
</script>
{% endblock %}
